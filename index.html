    <style>

<body>
    <div class="container">
        <h1>PenGems Visualizer</h1>
        <div id="preview-stage">
            <div id="canvas-container"></div>
        </div>
        <input type="file" id="file-input" accept=".ai,.svg,.jpg,.jpeg,.png" />

                <input id="background-flat-color" type="color" value="#101820">
            </div>
            <div id="background-gradient-row" class="background-row is-hidden">
                <label for="background-gradient-start">Start</label>
                <input id="background-gradient-start" type="color" value="#101820">
                <label for="background-gradient-end">End</label>
                <input id="background-gradient-end" type="color" value="#3f5a78">
            </div>
            <div id="background-image-row" class="background-row is-hidden">
                <label for="background-image-input">Image</label>

            </div>
        </div>
        <div class="export-controls">
            <div class="control-group">
                <label for="gif-fps-input">GIF FPS</label>

            </div>
            <div class="control-group">
                <label for="gif-duration-input">GIF Seconds</label>
                <input id="gif-duration-input" type="number" min="1" max="12" step="0.5" value="2.4">
            </div>
        </div>
        <div class="export-options">
            <button id="export-png-btn" class="btn">Export PNG</button>

        </div>
        <div id="export-status" aria-live="polite"></div>
        <div class="specs">
            <p><strong>Height:</strong> 58.6mm</p>
            <p><strong>Top Diameter:</strong> 10mm</p>
            <p><strong>Bottom Diameter:</strong> 8mm</p>
            <p><strong>Straight Section:</strong> 35mm</p>
        </div>
    </div>

    <script>
    let scene, camera, renderer, pen;
    let isExporting = false;
    let isRotating = false;
    let isTextured = false;
    let directionalLight, ambientLight;
    let rotationStartPoint = 0;
    let defaultBackgroundPromise;
    let goldBackgroundPromise;
    let customBackgroundObjectUrl = '';

    const PREVIEW_WIDTH = 450;
    const PREVIEW_HEIGHT = 800;
    const EXPORT_BACKGROUND_SRC = 'visualizerbackground-black.png';
    const GOLD_BACKGROUND_SRC = 'visualizerbackground-gold.png';
    const backgroundState = {
        type: 'default-image',
        flatColor: '#101820',
        gradientStart: '#101820',
        gradientEnd: '#3f5a78',
        customImage: null
    };
    const VIDEO_EXPORT = {
        width: 900,
        height: 1600,
        frameRate: 30,
        frameCount: 120
    };
    const GIF_EXPORT = {
        width: 540,
        height: 960,
        defaultFrameRate: 10,
        defaultDurationSeconds: 2.4
    };

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.OrthographicCamera(-20, 20, 35.6, -35.6, 1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
        renderer.setPixelRatio(window.devicePixelRatio || 1);
        renderer.setSize(PREVIEW_WIDTH, PREVIEW_HEIGHT);
        renderer.setClearColor(0x808080, 0);
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const points = [];
        const topRadius = 5;
        const bottomRadius = 4;
        const totalHeight = 58.6;
        const straightHeight = 35;
        const curveHeight = totalHeight - straightHeight;

        // Top circle
        for (let i = 0; i <= 20; i++) {
            points.push(new THREE.Vector2(Math.cos(i * 0.1 * Math.PI) * topRadius, totalHeight));
        }
        
        // Straight section
        points.push(new THREE.Vector2(topRadius, totalHeight));
        points.push(new THREE.Vector2(topRadius, curveHeight));
        
        // Curved section
        for (let i = 1; i <= 20; i++) {
            const t = i / 20;
            const radius = topRadius + (bottomRadius - topRadius) * t;
            const y = curveHeight * (1 - t);
            points.push(new THREE.Vector2(radius, y));
        }
        
        // Bottom circle
        for (let i = 20; i >= 0; i--) {
            points.push(new THREE.Vector2(Math.cos(i * 0.1 * Math.PI) * bottomRadius, 0));
        }

        const geometry = new THREE.LatheGeometry(points, 128);  // Increased segments to 128
        const material = new THREE.MeshStandardMaterial({ 
            color: 0xcccccc,
            metalness: 0.2,
            roughness: 0.1
        });
        pen = new THREE.Mesh(geometry, material);
        scene.add(pen);

        ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);

        const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
        fillLight.position.set(-1, -1, 1);
        scene.add(fillLight);

        camera.position.set(0, 29.3, 100);
        camera.lookAt(0, 29.3, 0);

        updateBackgroundControlsVisibility();
        applyPreviewBackground();
        animate();
    }

       
 function animate() {
    requestAnimationFrame(animate);
    if (isRotating) {
        if (pen) {
            pen.rotation.y += 0.01;
        }
    }
    renderer.render(scene, camera);

}

function handleFileUpload(event) {
    const file = event.target.files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
        const fileExtension = file.name.split('.').pop().toLowerCase();
        if (fileExtension === 'svg' || fileExtension === 'ai') {
            handleVectorImage(e.target.result);
        } else {
            handleRasterImage(e.target.result);
        }
    };

    reader.readAsDataURL(file);
}

function handleVectorImage(data) {
    const tempSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    tempSvg.innerHTML = data;
    document.body.appendChild(tempSvg);

    const canvas = document.createElement('canvas');
    canvas.width = 1024;
    canvas.height = 1024;
    const ctx = canvas.getContext('2d');
    const svgData = new XMLSerializer().serializeToString(tempSvg);
    const img = new Image();
    img.onload = function() {
        ctx.drawImage(img, 0, 0, 1024, 1024);
        document.body.removeChild(tempSvg);
        applyDecal(canvas.toDataURL());
    }
    img.src = 'data:image/svg+xml;base64,' + btoa(svgData);
}

function handleRasterImage(data) {
    applyDecal(data);
}

function applyDecal(imageData) {
    const texture = new THREE.TextureLoader().load(imageData, function(tex) {
        tex.encoding = THREE.sRGBEncoding;
        tex.wrapS = THREE.RepeatWrapping;
        tex.wrapT = THREE.ClampToEdgeWrapping;
        tex.minFilter = THREE.LinearMipmapLinearFilter;
        tex.magFilter = THREE.LinearFilter;
        tex.generateMipmaps = true;
        tex.anisotropy = renderer.capabilities.getMaxAnisotropy();

        if (pen.material.map) {
            pen.material.map.dispose();
        }

        pen.material.map = tex;
        pen.material.needsUpdate = true;

        const geometry = pen.geometry;
        const uv = geometry.attributes.uv;
        const position = geometry.attributes.position;

        for (let i = 0; i < uv.count; i++) {
            const x = position.getX(i);
            const y = position.getY(i);
            const z = position.getZ(i);

            const angle = Math.atan2(x, z);
            const u = (angle + Math.PI) / (2 * Math.PI);
            const v = y / 58.6;

            uv.setXY(i, u, v);
        }

        uv.needsUpdate = true;

        rotationStartPoint = Math.PI;
        pen.rotation.y = rotationStartPoint;
    });
}

function clearDecal() {
    if (pen.material.map) {
        pen.material.map.dispose();
        pen.material.map = null;
        pen.material.needsUpdate = true;
    }
    rotationStartPoint = 0;
    pen.rotation.y = rotationStartPoint;
}

function exportPNG() {
    renderer.render(scene, camera);
    renderer.domElement.toBlob((blob) => {
        saveAs(blob, 'pengems_design.png');
    }, 'image/png');
}

function exportJPG() {
    renderer.render(scene, camera);
    renderer.domElement.toBlob((blob) => {
        saveAs(blob, 'pengems_design.jpg');
    }, 'image/jpeg');
}

function getExportStatusElement() {
    return document.getElementById('export-status');
}

function setExportStatus(message, isError = false) {
    const status = getExportStatusElement();
    if (!status) {
        return;
    }

    status.textContent = message;
    status.style.color = isError ? '#c0392b' : '#2c3e50';
}

function setExportControlsDisabled(disabled) {
    [
        'export-png-btn',
        'export-jpg-btn',
        'export-mp4-btn',
        'export-gif-btn',
        'export-stl-btn',
        'clear-btn',
        'rotate-btn',
        'texture-btn',
        'gif-fps-input',
        'gif-duration-input',
        'background-type-select',
        'background-flat-color',
        'background-gradient-start',
        'background-gradient-end',
        'background-image-input'
    ].forEach((id) => {
        const element = document.getElementById(id);
        if (element) {
            element.disabled = disabled;
        }
    });
}

function loadDefaultBackgroundImage() {
    if (!defaultBackgroundPromise) {
        defaultBackgroundPromise = new Promise((resolve, reject) => {
            const image = new Image();
            image.onload = () => resolve(image);
            image.onerror = () => reject(new Error('Unable to load the export background image.'));
            image.src = EXPORT_BACKGROUND_SRC;
        });
    }

    return defaultBackgroundPromise;
}

function loadGoldBackgroundImage() {
    if (!goldBackgroundPromise) {
        goldBackgroundPromise = new Promise((resolve, reject) => {
            const image = new Image();
            image.onload = () => resolve(image);
            image.onerror = () => reject(new Error('Unable to load the gold background image.'));
            image.src = GOLD_BACKGROUND_SRC;
        });
    }

    return goldBackgroundPromise;
}

function createExportRenderer(width, height) {
    const exportRenderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true,
        preserveDrawingBuffer: true,
        powerPreference: 'high-performance'
    });
    exportRenderer.setPixelRatio(1);
    exportRenderer.setSize(width, height, false);
    exportRenderer.setClearColor(0x000000, 0);
    exportRenderer.outputEncoding = THREE.sRGBEncoding;

    if (pen.material.map) {
        pen.material.map.anisotropy = exportRenderer.capabilities.getMaxAnisotropy();
        pen.material.map.needsUpdate = true;
    }

    return exportRenderer;
}

function createCompositeCanvas(width, height) {
    const canvas = document.createElement('canvas');
    canvas.width = width;
    canvas.height = height;
    return canvas;
}

function getNumericInputValue(id, fallbackValue, minValue, maxValue) {
    const element = document.getElementById(id);
    const rawValue = element ? parseFloat(element.value) : fallbackValue;

    if (!Number.isFinite(rawValue)) {
        return fallbackValue;
    }

    return Math.min(Math.max(rawValue, minValue), maxValue);
}

function wait(milliseconds) {
    return new Promise((resolve) => {
        window.setTimeout(resolve, milliseconds);
    });
}

function getBackgroundCssValue() {
    if (backgroundState.type === 'flat-color') {
        return backgroundState.flatColor;
    }

    if (backgroundState.type === 'gold-image') {
        return `url('${GOLD_BACKGROUND_SRC}')`;
    }

    if (backgroundState.type === 'gradient') {
        return `linear-gradient(180deg, ${backgroundState.gradientStart} 0%, ${backgroundState.gradientEnd} 100%)`;
    }

    if (backgroundState.type === 'custom-image' && backgroundState.customImage) {
        return `url('${backgroundState.customImage.src}')`;
    }

    return `url('${EXPORT_BACKGROUND_SRC}')`;
}

function updateBackgroundControlsVisibility() {
    const flatRow = document.getElementById('background-flat-row');
    const gradientRow = document.getElementById('background-gradient-row');
    const imageRow = document.getElementById('background-image-row');

    flatRow.classList.toggle('is-hidden', backgroundState.type !== 'flat-color');
    gradientRow.classList.toggle('is-hidden', backgroundState.type !== 'gradient');
    imageRow.classList.toggle('is-hidden', backgroundState.type !== 'custom-image');
}

function applyPreviewBackground() {
    const container = document.getElementById('preview-stage');
    const backgroundValue = getBackgroundCssValue();

    container.style.backgroundImage = backgroundValue.startsWith('url(') || backgroundValue.startsWith('linear-gradient(')
        ? backgroundValue
        : 'none';
    container.style.backgroundColor = backgroundValue.startsWith('#') ? backgroundValue : 'transparent';
    container.style.backgroundSize = 'cover';
    container.style.backgroundRepeat = 'no-repeat';
    container.style.backgroundPosition = 'center';
}

async function loadImageFile(file) {
    return new Promise((resolve, reject) => {
        const objectUrl = URL.createObjectURL(file);
        const image = new Image();

        image.onload = () => resolve({ image, objectUrl });
        image.onerror = () => {
            URL.revokeObjectURL(objectUrl);
            reject(new Error('Unable to load the selected background image.'));
        };
        image.src = objectUrl;
    });
}

async function handleBackgroundImageUpload(event) {
    const file = event.target.files && event.target.files[0];
    if (!file) {
        return;
    }

    try {
        const { image, objectUrl } = await loadImageFile(file);
        if (customBackgroundObjectUrl) {
            URL.revokeObjectURL(customBackgroundObjectUrl);
        }

        customBackgroundObjectUrl = objectUrl;
        backgroundState.customImage = image;
        backgroundState.type = 'custom-image';
        document.getElementById('background-type-select').value = 'custom-image';
        updateBackgroundControlsVisibility();
        applyPreviewBackground();
        setExportStatus('Background image updated.');
    } catch (error) {
        console.error(error);
        alert(error.message || 'Unable to load that background image.');
    }
}

async function resolveExportBackgroundImage() {
    if (backgroundState.type === 'default-image') {
        return loadDefaultBackgroundImage().catch(() => null);
    }

    if (backgroundState.type === 'gold-image') {
        return loadGoldBackgroundImage().catch(() => null);
    }

    if (backgroundState.type === 'custom-image') {
        return backgroundState.customImage;
    }

    return null;
}

function drawCoverImage(context, image, width, height) {
    const imageAspect = image.width / image.height;
    const canvasAspect = width / height;
    let drawWidth = width;
    let drawHeight = height;
    let offsetX = 0;
    let offsetY = 0;

    if (imageAspect > canvasAspect) {
        drawHeight = height;
        drawWidth = height * imageAspect;
        offsetX = (width - drawWidth) / 2;
    } else {
        drawWidth = width;
        drawHeight = width / imageAspect;
        offsetY = (height - drawHeight) / 2;
    }

    context.drawImage(image, offsetX, offsetY, drawWidth, drawHeight);
}

function drawConfiguredBackground(context, width, height, backgroundImage) {
    context.clearRect(0, 0, width, height);

    if (backgroundState.type === 'flat-color') {
        context.fillStyle = backgroundState.flatColor;
        context.fillRect(0, 0, width, height);
        return;
    }

    if (backgroundState.type === 'gradient') {
        const gradient = context.createLinearGradient(0, 0, 0, height);
        gradient.addColorStop(0, backgroundState.gradientStart);
        gradient.addColorStop(1, backgroundState.gradientEnd);
        context.fillStyle = gradient;
        context.fillRect(0, 0, width, height);
        return;
    }

    if (backgroundImage) {
        drawCoverImage(context, backgroundImage, width, height);
        return;
    }

    context.fillStyle = '#111111';
    context.fillRect(0, 0, width, height);
}

function getSupportedVideoMimeType() {
    const mimeTypes = [
        'video/webm;codecs=vp9',
        'video/webm;codecs=vp8',
        'video/webm'
    ];

    if (typeof MediaRecorder === 'undefined') {
        return '';
    }

    return mimeTypes.find((mimeType) => MediaRecorder.isTypeSupported(mimeType)) || '';
}

function renderFrameToCanvas(exportRenderer, compositeCanvas, compositeContext, backgroundImage, rotation) {
    pen.rotation.y = rotation;
    exportRenderer.render(scene, camera);

    drawConfiguredBackground(compositeContext, compositeCanvas.width, compositeCanvas.height, backgroundImage);
    compositeContext.drawImage(exportRenderer.domElement, 0, 0, compositeCanvas.width, compositeCanvas.height);
}

async function runExport(exportLabel, exporter) {
    if (isExporting) {
        return;
    }

    const previousRotation = pen.rotation.y;
    const wasRotating = isRotating;
    isExporting = true;
    isRotating = false;
    setExportControlsDisabled(true);
    setExportStatus(exportLabel);

    try {
        await exporter(previousRotation);
        setExportStatus(`${exportLabel} complete.`);
    } catch (error) {
        console.error(error);
        setExportStatus(error.message || `Unable to complete ${exportLabel.toLowerCase()}.`, true);
        alert(error.message || 'The export failed. Please try again.');
    } finally {
        pen.rotation.y = previousRotation;
        isRotating = wasRotating;
        isExporting = false;
        setExportControlsDisabled(false);
        renderer.render(scene, camera);
    }
}

async function exportMP4() {
    const mimeType = getSupportedVideoMimeType();
    if (!mimeType) {
        alert('Video export is unavailable because this browser does not support WebM recording.');
        return;
    }

    await runExport('Exporting Video', async (startingRotation) => {
        const exportRenderer = createExportRenderer(VIDEO_EXPORT.width, VIDEO_EXPORT.height);
        const compositeCanvas = createCompositeCanvas(VIDEO_EXPORT.width, VIDEO_EXPORT.height);
        const compositeContext = compositeCanvas.getContext('2d');
        const backgroundImage = await resolveExportBackgroundImage();
        const stream = compositeCanvas.captureStream(0);
        const videoTrack = stream.getVideoTracks()[0];
        const chunks = [];
        const recorder = new MediaRecorder(stream, {
            mimeType,
            videoBitsPerSecond: 12000000
        });
        const recordingComplete = new Promise((resolve, reject) => {
            recorder.ondataavailable = (event) => {
                if (event.data && event.data.size > 0) {
                    chunks.push(event.data);
                }
            };
            recorder.onerror = () => reject(new Error('Video recording failed.'));
            recorder.onstop = () => {
                resolve(new Blob(chunks, { type: mimeType }));
            };
        });

        try {
            recorder.start();

            for (let frameIndex = 0; frameIndex < VIDEO_EXPORT.frameCount; frameIndex++) {
                const rotation = startingRotation + ((frameIndex / VIDEO_EXPORT.frameCount) * Math.PI * 2);
                renderFrameToCanvas(exportRenderer, compositeCanvas, compositeContext, backgroundImage, rotation);
                if (videoTrack && typeof videoTrack.requestFrame === 'function') {
                    videoTrack.requestFrame();
                }
                await wait(1000 / VIDEO_EXPORT.frameRate);

                if (frameIndex % 10 === 0 || frameIndex === VIDEO_EXPORT.frameCount - 1) {
                    setExportStatus(`Exporting Video (${frameIndex + 1}/${VIDEO_EXPORT.frameCount})`);
                }
            }

            await wait(150);
            recorder.stop();
            const blob = await recordingComplete;
            saveAs(blob, 'pengems_design.webm');
        } finally {
            stream.getTracks().forEach((track) => track.stop());
            exportRenderer.dispose();
        }
    });
}

async function exportGIF() {
    if (typeof GIF === 'undefined') {
        alert('GIF export is unavailable because gif.js did not load.');
        return;
    }

    await runExport('Exporting GIF', async (startingRotation) => {
        const gifFrameRate = getNumericInputValue('gif-fps-input', GIF_EXPORT.defaultFrameRate, 1, 30);
        const gifDurationSeconds = getNumericInputValue('gif-duration-input', GIF_EXPORT.defaultDurationSeconds, 1, 12);
        const gifFrameCount = Math.max(8, Math.round(gifFrameRate * gifDurationSeconds));
        const gifFrameDelay = Math.round(1000 / gifFrameRate);
        const exportRenderer = createExportRenderer(GIF_EXPORT.width, GIF_EXPORT.height);
        const compositeCanvas = createCompositeCanvas(GIF_EXPORT.width, GIF_EXPORT.height);
        const compositeContext = compositeCanvas.getContext('2d');
        const backgroundImage = await resolveExportBackgroundImage();
        const gif = new GIF({
            workers: 2,
            quality: 8,
            workerScript: 'scripts/gif.worker.js',
            width: GIF_EXPORT.width,
            height: GIF_EXPORT.height
        });

        gif.on('progress', (progress) => {
            setExportStatus(`Rendering GIF (${Math.round(progress * 100)}%)`);
        });

        try {
            for (let frameIndex = 0; frameIndex < gifFrameCount; frameIndex++) {
                const rotation = startingRotation + ((frameIndex / gifFrameCount) * Math.PI * 2);
                renderFrameToCanvas(exportRenderer, compositeCanvas, compositeContext, backgroundImage, rotation);
                gif.addFrame(compositeContext, {
                    copy: true,
                    delay: gifFrameDelay
                });

                if (frameIndex % 6 === 0 || frameIndex === gifFrameCount - 1) {
                    setExportStatus(`Preparing GIF (${frameIndex + 1}/${gifFrameCount})`);
                }
            }

            const blob = await new Promise((resolve, reject) => {
                gif.on('finished', resolve);
                gif.on('abort', () => reject(new Error('GIF export was aborted.')));
                gif.render();
            });

            saveAs(blob, 'pengems_design.gif');
        } finally {
            exportRenderer.dispose();
        }
    });
}

function exportSTL() {
    if (typeof THREE.STLExporter === 'undefined') {
        alert('STL export is unavailable because the STL exporter did not load.');
        return;
    }

    const exporter = new THREE.STLExporter();
    const stl = exporter.parse(pen);
    saveAs(new Blob([stl], { type: 'model/stl' }), 'pengems_design.stl');
}

function toggleRotation() {
    isRotating = !isRotating;
    const rotateBtn = document.getElementById('rotate-btn');
    if (isRotating) {
        rotateBtn.textContent = 'Stop Rotation';
        rotateBtn.classList.add('active');
    } else {
        rotateBtn.textContent = 'Start Rotation';
        rotateBtn.classList.remove('active');
    }
}

function toggleTexture() {
    isTextured = !isTextured;
    const textureBtn = document.getElementById('texture-btn');
    if (isTextured) {
        textureBtn.textContent = 'Remove Texture';
        textureBtn.classList.add('active');
        if (pen.material.map) {
            pen.material.bumpMap = pen.material.map;
            pen.material.bumpScale = 0.1;
            pen.material.needsUpdate = true;
        }
    } else {
        textureBtn.textContent = 'Add Texture';
        textureBtn.classList.remove('active');
        pen.material.bumpMap = null;
        pen.material.bumpScale = 0;
        pen.material.needsUpdate = true;
    }
}

function adjustBrightness(event) {
    const brightness = parseFloat(event.target.value);
    directionalLight.intensity = brightness;
    ambientLight.intensity = brightness * 0.6;
}

function handleBackgroundTypeChange(event) {
    backgroundState.type = event.target.value;
    updateBackgroundControlsVisibility();
    applyPreviewBackground();
    renderer.render(scene, camera);
}

function handleFlatColorChange(event) {
    backgroundState.flatColor = event.target.value;
    applyPreviewBackground();
}

function handleGradientStartChange(event) {
    backgroundState.gradientStart = event.target.value;
    applyPreviewBackground();
}

function handleGradientEndChange(event) {
    backgroundState.gradientEnd = event.target.value;
    applyPreviewBackground();
}

init();

document.getElementById('file-input').addEventListener('change', handleFileUpload);
document.getElementById('clear-btn').addEventListener('click', clearDecal);
document.getElementById('export-png-btn').addEventListener('click', exportPNG);
document.getElementById('export-jpg-btn').addEventListener('click', exportJPG);
document.getElementById('export-mp4-btn').addEventListener('click', exportMP4);
document.getElementById('export-gif-btn').addEventListener('click', exportGIF);
document.getElementById('export-stl-btn').addEventListener('click', exportSTL);
document.getElementById('rotate-btn').addEventListener('click', toggleRotation);
document.getElementById('texture-btn').addEventListener('click', toggleTexture);
document.getElementById('brightness-slider').addEventListener('input', adjustBrightness);
document.getElementById('background-type-select').addEventListener('change', handleBackgroundTypeChange);
document.getElementById('background-flat-color').addEventListener('input', handleFlatColorChange);
document.getElementById('background-gradient-start').addEventListener('input', handleGradientStartChange);
document.getElementById('background-gradient-end').addEventListener('input', handleGradientEndChange);
document.getElementById('background-image-input').addEventListener('change', handleBackgroundImageUpload);

</script>
